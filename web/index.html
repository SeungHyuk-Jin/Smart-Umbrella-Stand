<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우산공유예약서비스</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 40px 0;
        }
        h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s forwards;
        }
        .subtitle {
            font-size: 24px;
            font-weight: 300;
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s 0.5s forwards;
        }
        .features {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }
        .feature {
            width: 30%;
            text-align: center;
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s 1s forwards;
        }
        .feature img {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
        }
        .cta-button {
            display: inline-block;
            background-color: #0071e3;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 400;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s 1.5s forwards;
        }
        .cta-button:hover {
            background-color: #0077ed;
            transform: scale(1.05);
        }
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>우산공유예약<br>서비스</h1>
            <p class="subtitle">언제 어디서나, 필요할 때 우산을 빌리세요</p>
        </header>
        <div class="features">
            <div class="feature">
                <img src="umbrella.png" alt="우산 아이콘">
                <h2>간편한 예약</h2>
                <p>몇 번의 클릭만으로 우산을 예약하세요</p>
            </div>
            <div class="feature">
                <img src="map.png" alt="위치 아이콘">
                <h2>다양한 대여 장소</h2>
                <p>편의점, 지하철역 등 여러 장소에서 이용 가능</p>
            </div>
            <div class="feature">
                <img src="recycling.jpg" alt="에코 아이콘">
                <h2>환경 보호</h2>
                <p>일회용 우산 사용을 줄이고 환경을 보호해요</p>
            </div>
        </div>
        <div style="text-align: center;">
            <a href="map.html" class="cta-button">지금 바로 이용하기</a>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <script>
        gsap.from(".feature", {
            duration: 1,
            y: 50,
            opacity: 0,
            stagger: 0.2,
            ease: "power3.out",
            scrollTrigger: {
                trigger: ".features",
                start: "top 80%"
            }
        });
    </script>
</body>
</html>
